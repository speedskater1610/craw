name: Build craw Compiler and CRASM Assembler
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      # Linux
      - name: Install build tools on Linux
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential llvm-18 llvm-18-dev libpolly-18-dev clang-18

      - name: Set LLVM environment variables on Linux
        if: runner.os != 'Windows'
        run: |
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=/usr/lib/llvm-18/lib"   >> $GITHUB_ENV
          echo "PATH=/usr/lib/llvm-18/bin:$PATH"       >> $GITHUB_ENV

      - name: Build craw on Linux
        if: runner.os != 'Windows'
        run: make -f Makefile.mk all

      # Windows
      - name: Install LLVM 17 on Windows
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"
          directory: C:\LLVM

      - name: Install make on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install make --global -y --no-progress

      - name: Set LLVM environment variables on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          echo "LLVM_SYS_170_PREFIX=C:\LLVM"   >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=C:\LLVM\lib"      >> $env:GITHUB_ENV
          echo "PATH=C:\LLVM\bin;$env:PATH"     >> $env:GITHUB_ENV

      - name: Build craw on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: make -f Makefile.mk all

      # Artifacts
      - name: Upload craw artifact
        uses: actions/upload-artifact@v4
        with:
          name: craw-binary-${{ matrix.os }}
          path: |
            craw*