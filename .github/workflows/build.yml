name: Build craw Compiler and CRASM Assembler

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Install build tools on Linux
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential llvm-18 llvm-18-dev libpolly-18-dev clang-18

      - name: Set LLVM environment variables on Linux
        if: runner.os != 'Windows'
        run: |
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=/usr/lib/llvm-18/lib" >> $GITHUB_ENV
          echo "PATH=/usr/lib/llvm-18/bin:$PATH" >> $GITHUB_ENV

      - name: Install build tools on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          choco install make --global -y --no-progress
          choco install git --global -y --no-progress

      - name: Build craw on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: make -f Makefile.mk all

      - name: Build craw on Linux
        if: runner.os != 'Windows'
        run: make -f Makefile.mk all

      - name: Upload craw artifact
        uses: actions/upload-artifact@v4
        with:
          name: craw-binary-${{ matrix.os }}
          path: |
            craw*
